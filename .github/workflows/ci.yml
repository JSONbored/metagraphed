name: CI

# Gates every push and PR with the same checks a contributor runs locally:
# lint (ESLint + Prettier), typecheck (tsc), and a production build.
#
# Install uses `npm ci --legacy-peer-deps` against the public package-lock.json
# — the exact path Cloudflare Workers Builds uses to deploy. bun is canonical
# for local dev (see bunfig.toml / bun.lock), but bun.lock pins a few packages
# to Lovable's private mirror that 403s in CI, so CI deliberately uses npm to
# match production and stay reproducible.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: lint · typecheck · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint (ESLint + Prettier)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Guard against client-bundle regressions. Budget is ~28% above the current
      # ~233 KB gzipped; raise it deliberately (in the same PR) when a real
      # feature legitimately grows the bundle.
      - name: Bundle size budget (client JS, gzipped)
        run: |
          BUDGET_KB=300
          BYTES=$(find .output/public/assets -name '*.js' | sort | xargs cat | gzip -c | wc -c)
          KB=$(( (BYTES + 1023) / 1024 ))
          echo "Client JS (gzipped, concatenated): ${KB} KB / budget ${BUDGET_KB} KB"
          if [ "$KB" -gt "$BUDGET_KB" ]; then
            echo "::error::Client JS bundle ${KB} KB exceeds the ${BUDGET_KB} KB budget — investigate the regression or raise the budget deliberately."
            exit 1
          fi
