name: CI

# Gates every push and PR with the same checks a contributor runs locally:
# lint (ESLint + Prettier), typecheck (tsc), test, and a production build.
#
# Install uses `npm ci --legacy-peer-deps` against the public package-lock.json
# — reproducible in CI and the path contributors run locally. bun is canonical
# for dev (see bunfig.toml / bun.lock), and Cloudflare Workers Builds deploys
# PROD with `bun install --frozen-lockfile`. Because the build/test gates run on
# the npm tree, a package.json change that forgets to refresh bun.lock would sail
# through CI green and only break at the prod (bun) deploy. To close that gap the
# "bun.lock sync gate" step below re-runs `bun install --frozen-lockfile` (with
# bun's registry overridden to public npm via bunfig.toml) and fails fast if the
# lockfile is stale — turning a silent prod-deploy break into a red PR.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20.20.2
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      # bun.lock sync gate. PROD deploys via Cloudflare Workers Builds with
      # `bun install --frozen-lockfile`, so a package.json edit that forgets to
      # refresh bun.lock passes every npm-tree gate above yet breaks the prod
      # deploy (a known prior incident). `--frozen-lockfile` re-resolves against
      # the manifest and exits non-zero if bun.lock is out of sync — turning that
      # silent break into a red PR. `--dry-run` validates the lockfile without
      # writing node_modules, so it never disturbs the npm-installed tree the later
      # steps depend on. bunfig.toml pins the
      # registry to public npm and enforces the 24h minimumReleaseAge guard; this
      # only validates the existing lockfile (no resolution of new versions), so
      # the guard is a no-op here and the step is deterministic and offline-stable.
      - name: bun.lock sync gate (prod deploys with bun --frozen-lockfile)
        run: |
          if ! bun install --frozen-lockfile --dry-run; then
            echo "::error::bun.lock is out of sync with package.json. Cloudflare Workers Builds deploys prod with 'bun install --frozen-lockfile' and will fail. Run 'bun install' locally and commit the updated bun.lock."
            exit 1
          fi

      # Software-Composition-Analysis: surface known CVEs in our dependency
      # closure at PR time instead of waiting on Renovate's async, non-blocking
      # bumps. `--omit=dev` scopes the scan to runtime deps — dev/build tooling
      # never ships in the Worker bundle. Report-only for now (`|| true`): a high
      # finding annotates the run without failing CI so we can drive the baseline
      # to clean first. Tighten to blocking (drop `|| true`) once it stays empty.
      - name: Dependency CVE scan (SCA, report-only)
        run: |
          npm audit --audit-level=high --omit=dev \
            || echo "::warning::npm audit found high/critical advisories in runtime dependencies — review above (report-only; not failing CI yet)"

      - name: Lint (ESLint + Prettier)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Guard against client-bundle regressions. This measures the INITIAL client
      # transfer for a cold visit to "/" — the entry chunk plus the transitive
      # closure of its STATIC imports (the shared/vendor graph). It deliberately
      # EXCLUDES the lazily-loaded route chunks (dynamic import()), which the
      # browser never fetches on first paint. (The old gate gzipped every JS
      # asset concatenated together — ~55 chunks — which over-counted by ~100 KB
      # and punished route code-splitting.) Source of truth is TanStack Start's
      # per-route preload manifest (.output/server/_tanstack-start-manifest_v-*.mjs):
      # each route's `preloads` is its static module graph, so the cold first-load
      # set is __root__ (the entry) ∪ the "/" route preloads.
      #
      # Budget is ~28% above the current ~233 KB gzipped; raise it deliberately
      # (in the same PR) when a real feature legitimately grows the initial load.
      - name: Bundle size budget (initial client JS, gzipped)
        env:
          BUDGET_KB: 300
        run: |
          node --input-type=module <<'NODE'
          import { readdirSync, readFileSync } from "node:fs";
          import { gzipSync } from "node:zlib";
          import path from "node:path";

          const PUBLIC_DIR = ".output/public";
          const SERVER_DIR = ".output/server";

          const manifestFile = readdirSync(SERVER_DIR).find((f) =>
            /^_tanstack-start-manifest_v-.*\.mjs$/.test(f),
          );
          if (!manifestFile) {
            console.error(
              "::error::Could not find the TanStack Start manifest (_tanstack-start-manifest_v-*.mjs) in " +
                SERVER_DIR +
                " — the bundle-size gate cannot measure the initial load. Did the build setup change?",
            );
            process.exit(1);
          }

          const mod = await import(path.resolve(SERVER_DIR, manifestFile));
          const accessor = mod.default ?? Object.values(mod).find((v) => typeof v === "function");
          const manifest = typeof accessor === "function" ? accessor() : accessor;
          const routes = manifest?.routes;
          if (!routes?.__root__) {
            console.error("::error::Manifest has no routes/__root__ — cannot determine the entry chunk.");
            process.exit(1);
          }

          // Entry chunk + the landing route's static-import closure. Dynamic
          // route chunks are absent from `preloads` by construction, so they are
          // excluded automatically.
          const rootPreloads = routes.__root__.preloads ?? [];
          const homePreloads = routes["/"]?.preloads ?? [];
          const initial = [...new Set([...rootPreloads, ...homePreloads])].filter((f) =>
            f.endsWith(".js"),
          );
          if (initial.length === 0) {
            console.error("::error::No initial JS preloads found in the manifest — refusing to report 0 KB.");
            process.exit(1);
          }

          const buffers = initial
            .sort()
            .map((f) => readFileSync(path.join(PUBLIC_DIR, f.replace(/^\//, ""))));
          const bytes = gzipSync(Buffer.concat(buffers)).length;
          const kb = Math.ceil(bytes / 1024);

          const BUDGET_KB = Number(process.env.BUDGET_KB ?? 300);
          console.log(
            `Initial client JS (entry + static-import closure, gzipped): ${kb} KB / budget ${BUDGET_KB} KB  [${initial.length} chunks, lazy route chunks excluded]`,
          );
          if (kb > BUDGET_KB) {
            console.error(
              `::error::Initial client JS ${kb} KB exceeds the ${BUDGET_KB} KB budget — investigate the regression or raise the budget deliberately.`,
            );
            process.exit(1);
          }
          NODE
