[install]
# Resolve from public npm (bun.lock pins some packages to Lovable's private
# mirror, which 403s in CI/Workers Builds). package-lock.json is already public.
registry = "https://registry.npmjs.org"
# 24h supply-chain guard: skip package versions published less than a day ago.
minimumReleaseAge = 86400
# Each entry bypasses the 24h guard for one package — confirm with the user
# before adding any.
minimumReleaseAgeExcludes = [
  "@lovable.dev/vite-tanstack-config",
  "@lovable.dev/mcp-js",
  # Transitive dep of vite-tanstack-config@^2.4.0 (needs hmr-gate ^1.1.0); the
  # only matching release was <24h old, blocking lockfile regen + every CF
  # Workers Build. User-confirmed bypass (2026-06-16).
  "@lovable.dev/vite-plugin-hmr-gate",
  # First-party contract-types package, published as part of #1758 and adopted
  # here as the contract source of truth. The 0.6.0 release is <24h old, which
  # blocks bun.lock regen + every CF Workers Build until the guard clears.
  # First-party (JSONbored-owned) so the supply-chain risk the guard mitigates
  # does not apply; safe to bypass.
  "@jsonbored/metagraphed",
]
