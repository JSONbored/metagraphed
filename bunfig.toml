[install]
# Resolve from public npm (bun.lock pins some packages to Lovable's private
# mirror, which 403s in CI/Workers Builds). package-lock.json is already public.
registry = "https://registry.npmjs.org"
# 24h supply-chain guard: skip package versions published less than a day ago.
minimumReleaseAge = 86400
# Each entry bypasses the 24h guard for one package — confirm with the user
# before adding any.
minimumReleaseAgeExcludes = ["@lovable.dev/vite-tanstack-config", "@lovable.dev/mcp-js"]
