# Gittensory Gate scope manifest for metagraphed.
#
# wantedPaths  — patterns that signal this PR is a community data contribution
#                (auto-adjudicate: merge/close/escalate on the gate's rules).
# blockedPaths — if ANY changed file matches here the PR is NOT a community
#                data submission (hold for human review / do not auto-merge).
#
# Aligns with the paths: filter in .github/workflows/publish-cloudflare.yml so
# the gate's adjudication scope exactly tracks what a merged data PR publishes.

wantedPaths:
  - "registry/subnets/**"
  - "registry/providers/**"
  - "registry/candidates/community/**"
  - "registry/reviews/**"
  - "registry/adapters/**"

blockedPaths:
  # Root files can control trusted workflows, dependencies, deploys, or the
  # gate itself. Any root-file edit makes the PR a maintainer-reviewed change,
  # not an autonomously mergeable community data submission.
  - "*"
  - ".*"
  - "src/**"
  - "scripts/**"
  - "workers/**"
  - "schemas/**"
  - "tests/**"
  - "migrations/**"
  - "packages/**"
  - "public/**"
  - "docs-site/**"
  - ".github/**"
  - ".claude/**"

# Public review-panel note (Gittensory reads this for slop / review-load context).
review:
  note: >-
    docs-site PRs (#1652): large api-reference/playground output is gitignored
    and hash-pinned in docs-site/generated/manifest.json; committed surface is
    guides, catalog, resources, meta, generator, and tests. Verify with
    npm test -- tests/docs-site.test.mjs tests/route-samples.test.mjs &&
    npm run validate:docs-site.
